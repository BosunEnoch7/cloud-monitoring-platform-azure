name: Terraform Apply

on:
  workflow_dispatch:
    inputs:
      confirmation:
        description: "Type deploy to create a plan for the dev environment"
        required: true
        type: string

permissions:
  contents: read
  id-token: write

concurrency:
  group: terraform-dev
  cancel-in-progress: false

env:
  TF_IN_AUTOMATION: "true"
  TF_INPUT: "false"
  TF_ROOT: terraform/environments/dev
  TF_VAR_subscription_id: ${{ vars.AZURE_SUBSCRIPTION_ID }}
  TF_VAR_owner: ${{ vars.TF_OWNER }}
  TF_VAR_admin_source_cidrs: ${{ vars.TF_ADMIN_SOURCE_CIDRS_JSON }}
  TF_VAR_ssh_public_key: ${{ vars.TF_SSH_PUBLIC_KEY }}
  ARM_USE_OIDC: "true"
  ARM_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
  ARM_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}

jobs:
  plan:
    name: Create deployment plan
    if: ${{ inputs.confirmation == 'deploy' && github.ref == 'refs/heads/main' }}
    runs-on: ubuntu-latest
    env:
      ARM_CLIENT_ID: ${{ vars.AZURE_PLAN_CLIENT_ID }}

    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3
        with:
          terraform_version: 1.14.8

      - name: Authenticate to Azure with planning identity
        uses: azure/login@1384c340ab2dda50fed2bee3041d1d87018aa5e8 # v2
        with:
          client-id: ${{ vars.AZURE_PLAN_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Check formatting
        run: terraform fmt -check -recursive

      - name: Initialize Terraform
        working-directory: ${{ env.TF_ROOT }}
        run: |
          terraform init \
            -backend-config="resource_group_name=${{ vars.TF_STATE_RESOURCE_GROUP }}" \
            -backend-config="storage_account_name=${{ vars.TF_STATE_STORAGE_ACCOUNT }}" \
            -backend-config="container_name=${{ vars.TF_STATE_CONTAINER }}" \
            -backend-config="key=${{ vars.TF_STATE_KEY }}" \
            -backend-config="use_azuread_auth=true" \
            -backend-config="use_oidc=true"

      - name: Validate Terraform
        working-directory: ${{ env.TF_ROOT }}
        run: terraform validate

      - name: Create saved plan
        working-directory: ${{ env.TF_ROOT }}
        run: terraform plan -no-color -out=tfplan

      - name: Add plan to workflow summary
        working-directory: ${{ env.TF_ROOT }}
        run: |
          echo '## Terraform deployment plan' >> "$GITHUB_STEP_SUMMARY"
          echo 'Review this output before approving the apply job.' >> "$GITHUB_STEP_SUMMARY"
          echo '```text' >> "$GITHUB_STEP_SUMMARY"
          terraform show -no-color tfplan >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      - name: Upload saved plan
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: terraform-dev-plan
          path: ${{ env.TF_ROOT }}/tfplan
          retention-days: 1
          if-no-files-found: error

  apply:
    name: Apply approved plan
    needs: plan
    runs-on: ubuntu-latest
    environment: dev
    env:
      ARM_CLIENT_ID: ${{ vars.AZURE_APPLY_CLIENT_ID }}

    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3
        with:
          terraform_version: 1.14.8

      - name: Authenticate to Azure with deployment identity
        uses: azure/login@1384c340ab2dda50fed2bee3041d1d87018aa5e8 # v2
        with:
          client-id: ${{ vars.AZURE_APPLY_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Initialize Terraform
        working-directory: ${{ env.TF_ROOT }}
        run: |
          terraform init \
            -backend-config="resource_group_name=${{ vars.TF_STATE_RESOURCE_GROUP }}" \
            -backend-config="storage_account_name=${{ vars.TF_STATE_STORAGE_ACCOUNT }}" \
            -backend-config="container_name=${{ vars.TF_STATE_CONTAINER }}" \
            -backend-config="key=${{ vars.TF_STATE_KEY }}" \
            -backend-config="use_azuread_auth=true" \
            -backend-config="use_oidc=true"

      - name: Download approved plan
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: terraform-dev-plan
          path: ${{ env.TF_ROOT }}

      - name: Apply saved plan
        working-directory: ${{ env.TF_ROOT }}
        run: terraform apply -auto-approve tfplan
