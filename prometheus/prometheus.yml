global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    environment: dev
    platform: cloud-monitoring

rule_files:
  - /etc/prometheus/rules/*.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - 127.0.0.1:9093

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets:
          - 127.0.0.1:9090
        labels:
          service: prometheus

  - job_name: node
    static_configs:
      - targets:
          - 127.0.0.1:9100
        labels:
          instance_name: monitoring
          role: observability
